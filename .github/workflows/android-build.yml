name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'
          cache: 'npm'

      # 3. Setup Java JDK 21
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 4. Install npm dependencies
      - name: Install Dependencies
        run: npm ci || npm install

      # 5. Sync Capacitor web assets into Android project
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 5.5 Verify Java Version
      - name: Verify Java Version
        run: |
          java -version
          echo "JAVA_HOME is $JAVA_HOME"

      # 6. Build Android Debug APK
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

      # 7. Upload compiled APK to GitHub Artifacts
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeviceCarePro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
